version: '3.8'

services:
  ping-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resilient-ping-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  app-network:
    driver: bridge