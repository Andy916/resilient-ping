name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Compile and Test the Java Application
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Unit Tests
      run: mvn clean test

  # Job 2: Build and Ship the Docker Image
  build-image:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # New Step: Log into Docker Hub using our secure secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Upgraded Step: Build AND Push the image to the cloud warehouse
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        # Replace YOUR_DOCKERHUB_USERNAME with your actual username below
        tags: |
          andyhatt/resilient-ping:latest
          andyhatt/resilient-ping:${{ github.sha }}

    - name: Deploy to EC2 via AWS SSM (Keyless)
          env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION: "us-east-2"
          run: |
            # 1. Install AWS CLI on the runner
            sudo apt-get update && sudo apt-get install -y awscli

            # 2. Dynamically fetch the physical Instance ID of your server
            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=ResilientPingServer" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)

            echo "Targeting EC2 Instance ID: $INSTANCE_ID"

            # 3. Send the deployment shell script via AWS SSM
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploying updated Docker app container" \
              --parameters 'commands=[
                "sudo yum update -y",
                "sudo yum install -y docker",
                "sudo systemctl start docker",
                "sudo systemctl enable docker",
                "sudo docker pull andyhatt/resilient-ping:latest",
                "sudo docker stop resilient-app || true",
                "sudo docker rm resilient-app || true",
                "sudo docker run -d --name resilient-app -p 8080:8080 andyhatt/resilient-ping:latest"
              ]' \
              --output text